# DoRA configuration for LLaMA 3.2-3B (large)

model:
  name: "openlm-research/open_llama_3b"
  torch_dtype: "bfloat16"
  device_map: "auto"

dora:
  rank: 16
  alpha: 32.0
  dropout: 0.05
  eps: 1e-8
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"

training:
  learning_rate: 2e-4
  weight_decay: 0.01
  num_epochs: 5
  batch_size: 16
  gradient_accumulation_steps: 2
  max_grad_norm: 1.0
  warmup_ratio: 0.06
  scheduler_type: "cosine"
  max_length: 128
  fp16: false
  bf16: true
  dataloader_num_workers: 2

output:
  output_dir: "../results/llama_3b_dora"
  use_wandb: true
  wandb_project: "dora_glue"
