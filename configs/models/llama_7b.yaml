# DoRA Configuration for LLaMA Models

# Model-specific settings
model:
  name: "huggyllama/llama-7b"
  torch_dtype: "float16"
  device_map: "auto"

# DoRA parameters
dora:
  rank: 16
  alpha: 32.0
  dropout: 0.05
  eps: 1e-8
  init_magnitude_from_weight: true
  
  # Target modules for adaptation
  target_modules:
    - "q_proj"
    - "v_proj" 
    - "k_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"

# Training configuration
training:
  learning_rate: 2e-4
  weight_decay: 0.01
  num_epochs: 3
  batch_size: 8
  gradient_accumulation_steps: 1
  max_grad_norm: 1.0
  
  # DoRA-specific training settings
  dora_magnitude_lr_scale: 1.0
  freeze_base_weights: true
  warmup_steps: 100
  
  # Optimizer and scheduler
  optimizer_type: "adamw"
  scheduler_type: "cosine"
  
  # Evaluation and saving
  eval_strategy: "steps"
  eval_steps: 100
  save_steps: 500
  logging_steps: 10
  save_total_limit: 3
  
  # Hardware settings
  fp16: true
  bf16: false
  dataloader_num_workers: 4

# Output settings
output:
  output_dir: "./llama_dora_output"
  use_wandb: true
  wandb_project: "llama_dora_experiments"
  wandb_run_name: null